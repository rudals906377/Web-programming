<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action = "01.html" method = "post">
        <fieldset>
            <legend>회원가입</legend>
            <table width ="300">
                <tr>
                    <td><label for = "name">성명:</label></td>
                    <td><input type = "text" id = "name" name = "name"></td>
                </tr>
                <tr>
                    <td><label for = "email">이메일:</label></td>
                    <td><input type = "email" id = "email" name = "email"></td>
                </tr>
                <tr>
                    <td><label for = "addr">주소:</label></td>
                    <td><input type = "text" id = "addr" name = "addr"></td>
                </tr>
                <tr>
                    <td>성별</td>
                    <td>
                        <input type = "radio" id = "male" name = "gender" value = "남성">남성 &nbsp;&nbsp;
                        <input type = "radio" id = "female" name = "gender" value = "여성">여성
                    </td>
                </tr>
                <tr>
                    <td>취미</td>
                    <td>
                        <input type = "checkbox" name = "hobby" value = "독서">독서 &nbsp;&nbsp;
                        <input type = "checkbox" name = "hobby" value = "음악">음악 &nbsp;&nbsp;
                        <input type = "checkbox" name = "hobby" value = "스포츠">스포츠
                    </td>
                </tr>
                <tr>
                    <td>남기고 싶은 말:</td>
                    <td>
                        <textarea name = "message" cols = "30" rows = "5">기타 하고 싶은 말이 있으면 여기에 입력하세요.</textarea>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" align = "center">
                        <input type = "submit" value = "가입하기"> &nbsp;&nbsp;
                        <input type = "reset" value = "입력 초기화">
                    </td>
                </tr>
            </table>

            <br><br>
            <!-- 위에 거랑 같은 건데 밑에 거는 간격이 다름 -->
             성명 : <input type = "text" name = "name"><br><br>
             이메일 : <input type = "email" name = "email"><br><br>
             주소 : <input type = "text" name = "addr"><br><br>
             성별 : <input type = "radio" name = "gender" value = "남성">남성 &nbsp;&nbsp;
                  <input type = "radio" name = "gender" value = "여성">여성<br><br>
             취미 : <input type = "checkbox" name = "hobby" value = "독서">독서 &nbsp;&nbsp;
                <input type = "checkbox" name = "hobby" value = "음악">음악 &nbsp;&nbsp;
                <input type = "checkbox" name = "hobby" value = "스포츠">스포츠<br><br>
             <input type = "submit" value = "가입하기"> &nbsp;&nbsp;
             <input type = "reset" value = "입력 초기화">
        </fieldset>
    </form>
</body>
</html>
