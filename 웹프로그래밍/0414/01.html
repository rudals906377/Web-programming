<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 상태선택자 -->
    <style>
        input:enabled{
            background-color: rgb(202, 127, 127);
        }
        input:disabled:hover{
            background-color: rgb(55, 120, 173);
        }
        input:focus{
            background-color: rgb(131, 196, 131);
        }
    </style>
</head>
<body>
    <h1>사용 가능한 상태</h1>
    <input type="text"><br><br>
    <h1>사용 불가능한 상태</h1>
    <input type="text" disabled><br><br>
</body>
</html>
