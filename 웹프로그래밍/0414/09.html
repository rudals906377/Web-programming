<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1{
            width: 300px;
            height: 300px;
            background-color: rgb(12, 65, 43);
            color: white;
            border: 10px double rgb(41, 11, 11);
            margin: 0 50px 0 50px;
            padding: 0 50px 0 50px;
            /* margin-right: 50px;
            margin-left: 50px;
            padding-right: 50px;
            padding-left: 50px; */  /* margin과 padding은 축약형으로도 설정이 가능하다. */
            text-align: center;
            line-height: 300px;
        }

        .div2{
            width: 400px;
            height: 400px;
            background-color: rgb(16, 14, 141);
            color: white;
            border: 20px ridge rgb(88, 179, 76);
            margin: 0 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 300px;
        }

        .div3{
            width: 500px;
            height: 500px;
            background-color: rgb(204, 60, 132);
            color: white;
            border: 20px groove rgb(57, 82, 136);
            margin: 0 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 300px;
        }
    </style>
</head>
<body>
    <div class="div1">박스 속성과 값의 설정 방법</div><br>
    <div class="div2">박스 속성과 값의 설정 방법</div><br>
    <div class="div3">박스 속성과 값의 설정 방법</div>
</body>
</html>
