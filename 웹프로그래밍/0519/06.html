<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let Data = new Date();
        let hours = Data.getHours();

        if(hours < 5) {
            alert("더 주무세요.");
        } 
        else {
            if(hours < 7) {
                alert("출근 준비를 하세요.");
            }
            else {
                if(hours < 9) {
                    alert("회사에 출근 중입니다.");
                }
                else {
                    if(hours < 12) {
                        alert("열심히 회사 업무를 처리하세요.")
                    }
                    else {
                        if(hours < 13) {
                            alert("점심 식사 시간입니다.");
                        }
                        else { 
                            if(hours < 18) {
                                alert("열심히 회사 업무를 처리하세요.")
                            }
                            else {
                                alert("퇴근 시간입니다.");
                            }
                        }
                    }
                }
            }
        }
    </script>
</head>

</html>
