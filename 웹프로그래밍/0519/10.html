<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function add(num1, num2) {
            let sum = num1 + num2;
            alert(num1 + " + " + num2 + " = " + sum);
        }

        function greeting(message) {
            alert("오늘의 인사말: " + message);
        }

        add(100, 200);
        greeting("안녕하세요. 반갑습니다.");
        add(5, 7);
        greeting("화이팅화이팅");

    </script>
</head>

</html>
