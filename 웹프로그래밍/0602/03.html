<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소객체 속성 조작</title>
    <script>
        // textContent, innerHTML
        window.onload = function() {
            let img1 = document.getElementById("img1");

            // img1.src = "http://placehold.co/300x200";
            img1.src = "imgs/test_karina.jpg";
            img1.width = 300;
            img1.height = 400;
        }
        function changeImg(btn){
            if (btn.innerText === "카리나로 변경") {
                img1.src = "imgs/test_karina.jpg";
                img1.width = 300;
                img1.height = 400;
                btn.innerText = "고양이로 변경";
                
            } else {
                img1.src = "imgs/cat.jpg";
                img1.height = 200;
                btn.innerText = "카리나로 변경";
            }
            
        }
    </script>
</head>
<body>
    <button onclick="changeImg(this)">고양이로 변경</button>
    <br><br>
    <img id="img1">
</body>
</html>
