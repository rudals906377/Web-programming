<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        $(document).ready(
            function () {
                $(document).css("background", "black");

                $("#box").css({
                    backgroundColor: "orange",
                    width: "100px",
                    height: "100px"
                }
                );
                $("#box").animate({
                    width: "300px",
                    opacity: "0.5",
                }, 2000
            );

                ("#box").animate({
                    width: "100px",
                    opacity: "0.5",
                }, 2000
            );
            }
        );
    </script>
</head>

<body>
    <div id="box"></div>
</body>

</html>
