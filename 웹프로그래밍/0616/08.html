<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        $(document).ready(
            function () {
                $(document).css("background", "black");

                $("#box").css({
                    backgroundColor: "orange",
                    width: "100px",
                    position: "absolute",
                    height: "100px",
                    left: "10px",
                    top: "10px"
                }
                
               ).animate({
                    width: "300px",
                    opacity: "0.2",
                }, 2000
                

                ).animate({
                    opacity: "1.0",
                    left: "100px",
                    top: "100px"
                }, 2000
                );
            }
        );
    </script>
</head>

<body>
    <div id="box"></div>
</body>

</html>
